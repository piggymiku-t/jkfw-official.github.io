<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKFW2026</title>
    <style>
        /* 原有样式全部保留 */
        :root {
            --deep-blue: #0a1a2f;
            --biolight: #4ecdc4;
            --gold: #ffd700;
            --abyss: #050f1f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        body {
            background-color: var(--deep-blue);
            color: #fff;
            overflow-x: hidden;
        }
        /* 新增视频背景样式（只加这个） */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            overflow: hidden;
        }
        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,26,47,0.6);
            z-index: 1;
        }
        /* 原有气泡画布 */
        #bubble-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }
        /* 原有容器样式 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        /* 原有导航样式 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }
        .logo span {
            color: var(--gold);
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: var(--biolight);
        }
        /* 原有主视觉样式 */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70vh;
        }
        .hero-text {
            flex: 1;
        }
        .hero-text h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 2rem;
        }
        .hero-text h1 .line1 {
            color: #fff;
        }
        .hero-text h1 .line2 {
            color: var(--biolight);
        }
        .hero-text h1 .line3 {
            color: #a8d8ff;
        }
        .hero-text p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 600px;
        }
        .hero-buttons {
            display: flex;
            gap: 2rem;
        }
        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: var(--gold);
            color: var(--deep-blue);
            border: none;
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }
        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .circle-visual {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px dashed rgba(255,215,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle-visual .open-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: rgba(10,26,47,0.8);
            border: 2px solid var(--gold);
            color: var(--gold);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .circle-visual .open-btn:hover {
            background-color: var(--gold);
            color: var(--deep-blue);
        }
    </style>
</head>
<body>
    <!-- 只加这段视频背景，其他全保留 -->
    <div class="video-bg-container">
        <video class="video-bg" autoplay loop muted playsinline>
            <source src="https://raw.githubusercontent.com/piggymiku-T/jkfw-official.github.io/main/videos/videosbackground.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- 原有气泡画布（保留） -->
    <canvas id="bubble-canvas"></canvas>

    <!-- 原有页面内容（保留） -->
    <div class="container">
        <div class="navbar">
            <div class="logo">JKFW<span>2026</span></div>
            <div class="nav-links">
                <a href="#">CONCEPT</a>
                <a href="#">DeepOcean</a>
                <a href="#">ステージ</a>
                <a href="#">実績</a>
                <a href="#">MODELS</a>
                <a href="#">会場</a>
                <a href="#">ENTRY</a>
            </div>
        </div>

        <div class="hero">
            <div class="hero-text">
                <h1>
                    <div class="line1">TAKE DREAMS</div>
                    <div class="line2">FLY TO THE</div>
                    <div class="line3">DEEP</div>
                </h1>
                <p>「夢や希望を持つこと」は一人ひとりに与えられた権利。<br>2026年、深海が孵す新たなステージ。リアルとバーチャル、二つの深海へ。</p>
                <div class="hero-buttons">
                    <a href="#" class="btn btn-primary">エントリー受付中</a>
                    <a href="#" class="btn btn-secondary">新たな自分へ</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="circle-visual">
                    <div class="open-btn">OPEN</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 原有气泡JS（保留） -->
    <script>
        const canvas = document.getElementById('bubble-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 200;
                this.radius = Math.random() * 20 + 5;
                this.speed = Math.random() * 1 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.color = `rgba(78, 205, 196, ${this.alpha})`;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -this.radius) {
                    this.y = canvas.height + this.radius;
                    this.x = Math.random() * canvas.width;
                }
                this.draw();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        let bubbles = [];
        for (let i = 0; i < 50; i++) {
            bubbles.push(new Bubble());
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bubbles.forEach(bubble => bubble.update());
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
