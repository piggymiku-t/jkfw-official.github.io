<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dream World Fes 2026 | 子どもが主役の夢フェス</title>
    <meta name="description" content="8月8日-9日、淡路夢舞台で開催！子ども店長・キッズファッションショー・世界のグルメ・ダンスステージ。LINEで限定特典。">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jkfw2026.com/dreamworldfes.html">
    
    <meta property="og:title" content="Dream World Fes 2026 | 淡路島で子どもが主役の魔法の2日間">
    <meta property="og:description" content="泡泡から飛び出す6つの夢体験。LINE追加でクーポン。">
    <meta property="og:image" content="https://raw.githubusercontent.com/piggymiku-T/jkfw-official.github.io/main/images/og-dreamworldfes.jpg">
    <meta name="twitter:card" content="summary_large_image">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center center;
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
            overflow-x: auto;
            transition: background-image 0.2s;
        }
        /* 初期背景（PC用） */
        body {
            background-image: url('images/boy-bubble-full.png');
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 30, 40, 0.2);
            pointer-events: none;
            z-index: 0;
        }
        .magic-container {
            position: relative;
            max-width: 1300px;
            margin: 0 auto;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }
        .cards-grid.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .event-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .event-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.98);
        }
        .card-icon { font-size: 2.8rem; margin-bottom: 0.6rem; }
        .event-card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f6d49, #3b9b6b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .card-detail {
            font-size: 0.85rem;
            color: #4a6741;
            border-top: 1px solid #d9e6c3;
            margin-top: 0.8rem;
            padding-top: 0.6rem;
            display: flex;
            justify-content: space-between;
        }
        .line-section {
            text-align: center;
            background: rgba(6, 199, 85, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem 1.5rem;
            margin: 2rem 0 3rem;
            border: 2px dashed #06c755;
        }
        .line-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #06c755;
            color: white;
            font-weight: 800;
            font-size: 1.4rem;
            padding: 0.9rem 2.2rem;
            border-radius: 60px;
            text-decoration: none;
            transition: 0.2s;
        }
        .line-button:hover { background: #05a347; transform: scale(1.02); }
        .hero-message {
            text-align: center;
            margin-bottom: 2rem;
            background: rgba(255, 246, 205, 0.85);
            border-radius: 70px;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }
        .hero-message h1 { font-size: 1.9rem; font-weight: 900; color: #2e5c2e; }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #ffffdd;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            margin-top: 2rem;
        }
        @keyframes popIn {
            0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .card-pop { animation: popIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) forwards; }
        
        .bubbles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
        }
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,245,0.6), rgba(200,230,250,0.4));
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,200,0.8);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: rgba(11,79,46,0.7);
            transition: all 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: left, top;
            animation: bubbleAppear 0.2s ease-out;
        }
        @keyframes bubbleAppear {
            0% { transform: scale(0.6); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.95; }
        }
        .bubble-popping {
            animation: bubblePop 0.2s forwards !important;
        }
        @keyframes bubblePop {
            100% { transform: scale(0.2); opacity: 0; }
        }
        
        /* 调试面板 */
        .debug-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 10000;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            border-left: 4px solid #0f0;
            white-space: pre;
            line-height: 1.4;
            cursor: crosshair;
        }
        .debug-crosshair {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            background: rgba(255,0,0,0.2);
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .hero-message h1 { font-size: 1.4rem; }
            .debug-panel { font-size: 10px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>
<div class="magic-container">
    <div class="hero-message">
        <h1>🎈 ぷくっと吹いたら、夢が広がる 🎈</h1>
        <p>JKFW Dream World Fes2026｜淡路夢舞台 8月8日(土)・9日(日)</p>
    </div>
    <div id="cardsGrid" class="cards-grid"></div>
    <div id="lineArea" class="line-section" style="display: none;">
        <div style="font-size: 1.8rem;">📱💚</div>
        <h3 style="color:#1d5a3e;">LINEで限定特典＆最新情報を受け取る</h3>
        <p>🍭 ワークショップ事前予約枠<br>🍬 当日使える「子ども500円割引クーポン」<br>☔ 雨天プログラムのお知らせ</p>
        <a href="https://lin.ee/1n4YOHY" target="_blank" class="line-button">➕ 公式LINEを追加する</a>
        <div class="line-offer">🎁 先着200組にキッズドリンク無料！</div>
    </div>
    <div class="footer-note">
        ⭐ 主催：JKFW2026運営委員会 / 同時開催 Dream World Fes2026・キッチンカーEXPO
    </div>
</div>
<div id="bubbleLayer" class="bubbles-layer"></div>

<div id="debugPanel" class="debug-panel">
    🔧 デバッグモード: ON<br>
    現在の口座標: X=<span id="debugX">0.78</span> Y=<span id="debugY">0.82</span><br>
    🖱️ クリックで座標を設定 (背景画像上のマウス位置)
</div>
<div id="crosshair" class="debug-crosshair"></div>

<script>
    (function(){
        // ========== ここに PC と スマホ それぞれの口の座標を設定 ==========
        let PC_X = 0.78;
        let PC_Y = 0.82;
        let MOBILE_X = 0.78;
        let MOBILE_Y = 0.82;
        // =================================================================
        
        // 背景画像切り替え（画面幅768px以下でモバイル用画像）
        const isMobile = () => window.innerWidth <= 768;
        function setBackgroundByDevice() {
            const mobile = isMobile();
            const bgUrl = mobile 
                ? 'url(\'images/boy-bubble-full-mobile.png\')' 
                : 'url(\'images/boy-bubble-full.png\')';
            document.body.style.backgroundImage = bgUrl;
        }
        setBackgroundByDevice();
        window.addEventListener('resize', () => {
            setBackgroundByDevice();
            updateDebugDisplay();
        });
        
        function getCurrentMouthPercent() {
            return isMobile() 
                ? { x: MOBILE_X, y: MOBILE_Y }
                : { x: PC_X, y: PC_Y };
        }
        
        function updateDebugDisplay() {
            const cur = getCurrentMouthPercent();
            document.getElementById('debugX').innerText = cur.x.toFixed(4);
            document.getElementById('debugY').innerText = cur.y.toFixed(4);
        }
        
        const activities = [
            { id: "fashion", icon: "👗✨", title: "キッズファッションショー", desc: "お子様がランウェイを歩く！夢の2Fフロア", detail: "プロカメラマン撮影＆特別ステージ" },
            { id: "oshigoto", icon: "🍰🔧", title: "おしごと体験", desc: "パティシエ・医者・デザイナー…本物の職業体験", detail: "子ども店長としておもてなし" },
            { id: "gourmet", icon: "🌍🍜", title: "世界のグルメ", desc: "キッチンカー15台！淡路で世界一周食べ歩き", detail: "台湾・イタリア・ブラジルetc" },
            { id: "dance", icon: "💃🕺", title: "キッズダンスステージ", desc: "今まで頑張った努力を最高の舞台で", detail: "世界中のダンサーが熱演" },
            { id: "en'nichi", icon: "🎯🎏", title: "子ども縁日", desc: "こども店長が射的・ヨーヨー釣りを仕切る", detail: "おもてなし体験＆わくわく遊び" },
            { id: "handmade", icon: "🧸🎨", title: "ハンドメイドマーケット", desc: "世界にひとつ！こども作品＆雑貨", detail: "ユニークな宝物を探そう" }
        ];
        const targetPositions = [
            { left: "12%", top: "28%" }, { left: "68%", top: "22%" }, { left: "35%", top: "48%" },
            { left: "78%", top: "65%" }, { left: "22%", top: "72%" }, { left: "52%", top: "85%" }
        ];
        let addedToGrid = new Set();
        let animationCompletedCount = 0;
        const totalBubbles = activities.length;
        let isAnimationFinished = false;
        
        const bubbleLayer = document.getElementById('bubbleLayer');
        const cardsGrid = document.getElementById('cardsGrid');
        const lineArea = document.getElementById('lineArea');
        
        // 获取当前背景图实际显示区域（background-size: cover, 居中）
        function getBackgroundImageRect() {
            return new Promise((resolve) => {
                const bodyStyle = getComputedStyle(document.body);
                let bgImageUrl = bodyStyle.backgroundImage;
                if (!bgImageUrl || bgImageUrl === 'none') { resolve(null); return; }
                bgImageUrl = bgImageUrl.slice(4, -1).replace(/"/g, '');
                const img = new Image();
                img.onload = () => {
                    const viewW = window.innerWidth;
                    const viewH = window.innerHeight;
                    const imgW = img.width;
                    const imgH = img.height;
                    const imgRatio = imgW / imgH;
                    const viewRatio = viewW / viewH;
                    let bgWidth, bgHeight, bgLeft, bgTop;
                    if (imgRatio > viewRatio) {
                        bgHeight = viewH;
                        bgWidth = bgHeight * imgRatio;
                        bgLeft = (viewW - bgWidth) / 2;
                        bgTop = 0;
                    } else {
                        bgWidth = viewW;
                        bgHeight = bgWidth / imgRatio;
                        bgLeft = 0;
                        bgTop = (viewH - bgHeight) / 2;
                    }
                    resolve({ left: bgLeft, top: bgTop, width: bgWidth, height: bgHeight });
                };
                img.onerror = () => resolve(null);
                img.src = bgImageUrl;
            });
        }
        
        async function getMousePercentFromClick(clientX, clientY) {
            const rect = await getBackgroundImageRect();
            if (!rect) return null;
            const relativeX = clientX - rect.left;
            const relativeY = clientY - rect.top;
            if (relativeX < 0 || relativeX > rect.width || relativeY < 0 || relativeY > rect.height) return null;
            return { x: relativeX / rect.width, y: relativeY / rect.height };
        }
        
        async function getStartPoint() {
            const rect = await getBackgroundImageRect();
            const percent = getCurrentMouthPercent();
            if (!rect) return { x: window.innerWidth * percent.x, y: window.innerHeight * percent.y };
            return {
                x: rect.left + rect.width * percent.x,
                y: rect.top + rect.height * percent.y
            };
        }
        
        function getEndPoint(percentLeft, percentTop) {
            const w = window.innerWidth, h = window.innerHeight;
            let leftVal = typeof percentLeft === 'string' ? parseFloat(percentLeft) / 100 * w : percentLeft;
            let topVal = typeof percentTop === 'string' ? parseFloat(percentTop) / 100 * h : percentTop;
            return { x: leftVal, y: topVal };
        }
        
        function addCardToGrid(activity) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'event-card';
            cardDiv.innerHTML = `
                <div class="card-icon">${activity.icon}</div>
                <h3>${activity.title}</h3>
                <p>${activity.desc}</p>
                <div class="card-detail"><span>🎪 もっと見る</span> ${activity.detail}</div>
            `;
            cardDiv.addEventListener('click', () => document.getElementById('lineArea').scrollIntoView({ behavior: 'smooth' }));
            cardsGrid.appendChild(cardDiv);
        }
        
        function showTempCardAndAddToGrid(activity, x, y) {
            if(addedToGrid.has(activity.id)) return;
            const tempCard = document.createElement('div');
            tempCard.className = 'event-card card-pop';
            tempCard.style.position = 'fixed';
            tempCard.style.left = (x - 140) + 'px';
            tempCard.style.top = (y - 80) + 'px';
            tempCard.style.width = '260px';
            tempCard.style.zIndex = 100;
            tempCard.style.background = 'white';
            tempCard.innerHTML = `<div class="card-icon">${activity.icon}</div><h3>${activity.title}</h3><p>${activity.desc}</p><div class="card-detail"><span>✨ 詳細へ</span> ${activity.detail}</div>`;
            document.body.appendChild(tempCard);
            setTimeout(() => {
                if(tempCard && tempCard.isConnected) tempCard.remove();
                if(!addedToGrid.has(activity.id)) {
                    addCardToGrid(activity);
                    addedToGrid.add(activity.id);
                    animationCompletedCount++;
                }
                if(animationCompletedCount === totalBubbles && !isAnimationFinished) {
                    isAnimationFinished = true;
                    cardsGrid.classList.add('visible');
                    if(bubbleLayer) bubbleLayer.innerHTML = '';
                    lineArea.style.display = 'block';
                    lineArea.style.animation = 'popIn 0.6s ease';
                }
            }, 500);
        }
        
        function evolveBubbleToCard(bubble, activity, endX, endY) {
            if(!bubble.isConnected) return;
            bubble.classList.add('bubble-popping');
            const rect = bubble.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            setTimeout(() => {
                bubble.remove();
                showTempCardAndAddToGrid(activity, centerX, centerY);
            }, 180);
        }
        
        async function createBubbleAsync(activityIndex, targetPos) {
            if(isAnimationFinished) return;
            const activity = activities[activityIndex];
            const start = await getStartPoint();
            const end = getEndPoint(targetPos.left, targetPos.top);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = 70;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = (start.x - size/2) + 'px';
            bubble.style.top = (start.y - size/2) + 'px';
            bubble.style.position = 'fixed';
            bubble.innerHTML = `<span style="opacity:0.6;">${activity.icon.slice(0,2)}</span>`;
            bubble.style.display = 'flex';
            bubble.style.alignItems = 'center';
            bubble.style.justifyContent = 'center';
            bubbleLayer.appendChild(bubble);
            bubble.offsetHeight;
            bubble.style.left = (end.x - size/2) + 'px';
            bubble.style.top = (end.y - size/2) + 'px';
            bubble.style.transform = 'scale(1.02)';
            const onFinish = () => { if(bubble.isConnected) evolveBubbleToCard(bubble, activity, end.x, end.y); bubble.removeEventListener('transitionend', onFinish); };
            bubble.addEventListener('transitionend', onFinish, { once: true });
            setTimeout(() => { if(bubble && bubble.isConnected) evolveBubbleToCard(bubble, activity, end.x, end.y); }, 1400);
        }
        
        async function startBubbleSequence() {
            for (let i = 0; i < totalBubbles; i++) {
                if (isAnimationFinished) break;
                await createBubbleAsync(i, targetPositions[i]);
                if (i < totalBubbles - 1) await new Promise(r => setTimeout(r, 750));
            }
            setTimeout(() => {
                if(animationCompletedCount < totalBubbles && !isAnimationFinished) {
                    for(let i=0; i<activities.length; i++) if(!addedToGrid.has(activities[i].id)) { addCardToGrid(activities[i]); addedToGrid.add(activities[i].id); animationCompletedCount++; }
                    cardsGrid.classList.add('visible');
                    lineArea.style.display = 'block';
                    isAnimationFinished = true;
                }
            }, 10000);
        }
        
        // 调试：点击获取坐标
        async function onDebugClick(e) {
            const percent = await getMousePercentFromClick(e.clientX, e.clientY);
            if (!percent) return;
            const mobile = isMobile();
            if (mobile) {
                MOBILE_X = percent.x;
                MOBILE_Y = percent.y;
            } else {
                PC_X = percent.x;
                PC_Y = percent.y;
            }
            updateDebugDisplay();
            const toast = document.createElement('div');
            toast.textContent = `✅ ${mobile ? 'スマホ' : 'PC'} 口座標: X=${percent.x.toFixed(4)} Y=${percent.y.toFixed(4)} (コード内の値を更新)`;
            toast.style.cssText = 'position:fixed; bottom:80px; left:20px; background:#333; color:#0f0; padding:8px 12px; border-radius:8px; z-index:10001; font-size:12px;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
            const preview = document.createElement('div');
            preview.style.cssText = `position:fixed; width:30px; height:30px; border-radius:50%; background:rgba(0,255,0,0.5); border:2px solid lime; left:${e.clientX-15}px; top:${e.clientY-15}px; z-index:10002; pointer-events:none;`;
            document.body.appendChild(preview);
            setTimeout(() => preview.remove(), 800);
        }
        
        const debugPanelDiv = document.getElementById('debugPanel');
        debugPanelDiv.addEventListener('click', onDebugClick);
        
        updateDebugDisplay();
        
        cardsGrid.classList.remove('visible');
        startBubbleSequence();
    })();
</script>
</body>
</html>
