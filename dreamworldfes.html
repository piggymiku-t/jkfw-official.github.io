<script>
    (function(){
        // 活動データ（6つの夢）
        const activities = [
            { id: "fashion", icon: "👗✨", title: "キッズファッションショー", desc: "お子様がランウェイを歩く！夢の2Fフロア", detail: "プロカメラマン撮影＆特別ステージ" },
            { id: "oshigoto", icon: "🍰🔧", title: "おしごと体験", desc: "パティシエ・医者・デザイナー…本物の職業体験", detail: "子ども店長としておもてなし" },
            { id: "gourmet", icon: "🌍🍜", title: "世界のグルメ", desc: "キッチンカー15台！淡路で世界一周食べ歩き", detail: "台湾・イタリア・ブラジルetc" },
            { id: "dance", icon: "💃🕺", title: "キッズダンスステージ", desc: "今まで頑張った努力を最高の舞台で", detail: "世界中のダンサーが熱演" },
            { id: "en'nichi", icon: "🎯🎏", title: "子ども縁日", desc: "こども店長が射的・ヨーヨー釣りを仕切る", detail: "おもてなし体験＆わくわく遊び" },
            { id: "handmade", icon: "🧸🎨", title: "ハンドメイドマーケット", desc: "世界にひとつ！こども作品＆雑貨", detail: "ユニークな宝物を探そう" }
        ];
        const targetPositions = [
            { left: "12%", top: "28%" }, { left: "68%", top: "22%" }, { left: "35%", top: "48%" },
            { left: "78%", top: "65%" }, { left: "22%", top: "72%" }, { left: "52%", top: "85%" }
        ];
        let addedToGrid = new Set();
        let animationCompletedCount = 0;
        const totalBubbles = activities.length;
        let isAnimationFinished = false;
        let currentBubbleIndex = 0;
        let bubbleQueue = []; // 存储待创建的泡泡（异步起点准备）
        
        const bubbleLayer = document.getElementById('bubbleLayer');
        const cardsGrid = document.getElementById('cardsGrid');
        const lineArea = document.getElementById('lineArea');
        
        // 小男孩嘴巴在原始图片中的百分比坐标（根据实际海报微调）
        const MOUTH_PERCENT_X = 0.78;   // 水平方向，0=左边缘，1=右边缘
        const MOUTH_PERCENT_Y = 0.82;   // 垂直方向，0=顶边缘，1=底边缘
        
        // デバッグモードフラグ
        let debugMode = false;
        const debugMarker = document.getElementById('debugMarker');
        
        // 显示/隐藏调试标记
        function toggleDebugMarker(show, x, y) {
            if (show && debugMode) {
                debugMarker.style.display = 'block';
                debugMarker.style.left = x + 'px';
                debugMarker.style.top = y + 'px';
            } else if (!show) {
                debugMarker.style.display = 'none';
            }
        }
        
        // 智能获取背景图片实际显示区域中的嘴巴坐标（异步）
        function getStartPointAsync() {
            return new Promise((resolve) => {
                const bodyStyle = getComputedStyle(document.body);
                let bgImageUrl = bodyStyle.backgroundImage;
                if (!bgImageUrl || bgImageUrl === 'none') {
                    // fallback: 直接使用右下角固定比例
                    resolve({
                        x: window.innerWidth * MOUTH_PERCENT_X,
                        y: window.innerHeight * MOUTH_PERCENT_Y
                    });
                    return;
                }
                // 提取URL
                bgImageUrl = bgImageUrl.slice(4, -1).replace(/"/g, '');
                const img = new Image();
                img.onload = () => {
                    const viewW = window.innerWidth;
                    const viewH = window.innerHeight;
                    const imgW = img.width;
                    const imgH = img.height;
                    const imgRatio = imgW / imgH;
                    const viewRatio = viewW / viewH;
                    
                    let bgWidth, bgHeight, bgLeft, bgTop;
                    // background-size: cover 的计算公式
                    if (imgRatio > viewRatio) {
                        bgHeight = viewH;
                        bgWidth = bgHeight * imgRatio;
                        bgLeft = (viewW - bgWidth) / 2;
                        bgTop = 0;
                    } else {
                        bgWidth = viewW;
                        bgHeight = bgWidth / imgRatio;
                        bgLeft = 0;
                        bgTop = (viewH - bgHeight) / 2;
                    }
                    
                    // 再考虑 background-position: right bottom
                    // 因为 background-position 设置为 right bottom，我们需要将图片的右下角对齐视口的右下角
                    // 也就是图片的右边缘对齐视口右边缘，图片下边缘对齐视口下边缘
                    // 对于 cover 模式，上述计算得到的 bgLeft, bgTop 是基于居中定位的。
                    // 现在要调整为右下角对齐。
                    // 计算公式：新的 left = 视口宽 - 图片宽；新的 top = 视口高 - 图片高
                    const newLeft = viewW - bgWidth;
                    const newTop = viewH - bgHeight;
                    
                    // 嘴巴在背景图上的绝对坐标
                    const mouthX = newLeft + bgWidth * MOUTH_PERCENT_X;
                    const mouthY = newTop + bgHeight * MOUTH_PERCENT_Y;
                    
                    // 调试模式下显示标记
                    if (debugMode) {
                        toggleDebugMarker(true, mouthX, mouthY);
                        console.log(`Debug: mouth at (${mouthX}, ${mouthY})`);
                    }
                    
                    resolve({ x: mouthX, y: mouthY });
                };
                img.onerror = () => {
                    // 图片加载失败，fallback
                    resolve({
                        x: window.innerWidth * MOUTH_PERCENT_X,
                        y: window.innerHeight * MOUTH_PERCENT_Y
                    });
                };
                img.src = bgImageUrl;
            });
        }
        
        function getEndPoint(percentLeft, percentTop) {
            const w = window.innerWidth, h = window.innerHeight;
            let leftVal = typeof percentLeft === 'string' ? parseFloat(percentLeft) / 100 * w : percentLeft;
            let topVal = typeof percentTop === 'string' ? parseFloat(percentTop) / 100 * h : percentTop;
            return { x: leftVal, y: topVal };
        }
        
        function addCardToGrid(activity) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'event-card';
            cardDiv.innerHTML = `
                <div class="card-icon">${activity.icon}</div>
                <h3>${activity.title}</h3>
                <p>${activity.desc}</p>
                <div class="card-detail"><span>🎪 もっと見る</span>  ${activity.detail}</div>
            `;
            cardDiv.addEventListener('click', () => document.getElementById('lineArea').scrollIntoView({ behavior: 'smooth', block: 'center' }));
            cardsGrid.appendChild(cardDiv);
        }
        
        function showTempCardAndAddToGrid(activity, x, y) {
            if(addedToGrid.has(activity.id)) return;
            const tempCard = document.createElement('div');
            tempCard.className = 'event-card card-pop';
            tempCard.style.position = 'fixed';
            tempCard.style.left = (x - 140) + 'px';
            tempCard.style.top = (y - 80) + 'px';
            tempCard.style.width = '260px';
            tempCard.style.zIndex = 100;
            tempCard.style.background = 'white';
            tempCard.innerHTML = `<div class="card-icon">${activity.icon}</div><h3>${activity.title}</h3><p>${activity.desc}</p><div class="card-detail"><span>✨ 詳細へ</span>  ${activity.detail}</div>`;
            document.body.appendChild(tempCard);
            setTimeout(() => {
                if(tempCard && tempCard.isConnected) tempCard.remove();
                if(!addedToGrid.has(activity.id)) {
                    addCardToGrid(activity);
                    addedToGrid.add(activity.id);
                    animationCompletedCount++;
                }
                if(animationCompletedCount === totalBubbles && !isAnimationFinished) {
                    isAnimationFinished = true;
                    cardsGrid.classList.add('visible');
                    if(bubbleLayer) bubbleLayer.innerHTML = '';
                    lineArea.style.display = 'block';
                    lineArea.style.animation = 'popIn 0.6s ease';
                }
            }, 500);
        }
        
        function evolveBubbleToCard(bubble, activity, endX, endY) {
            if(!bubble.isConnected) return;
            const rect = bubble.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            bubble.style.transition = 'all 0.2s ease';
            bubble.style.transform = 'scale(0.2)';
            bubble.style.opacity = '0';
            setTimeout(() => {
                bubble.remove();
                showTempCardAndAddToGrid(activity, centerX, centerY);
            }, 150);
        }
        
        async function createBubbleAsync(activityIndex, targetPos) {
            if(isAnimationFinished) return;
            const activity = activities[activityIndex];
            const start = await getStartPointAsync();
            const end = getEndPoint(targetPos.left, targetPos.top);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = 70;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = (start.x - size/2) + 'px';
            bubble.style.top = (start.y - size/2) + 'px';
            bubble.style.position = 'fixed';
            bubble.innerHTML = `<span style="font-size:2.4rem;">${activity.icon.slice(0,2)}</span>`;
            bubble.style.display = 'flex';
            bubble.style.alignItems = 'center';
            bubble.style.justifyContent = 'center';
            bubbleLayer.appendChild(bubble);
            bubble.offsetHeight;
            bubble.style.transition = 'all 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            bubble.style.left = (end.x - size/2) + 'px';
            bubble.style.top = (end.y - size/2) + 'px';
            bubble.style.transform = 'scale(1.02)';
            const onFinish = () => { if(bubble.isConnected) evolveBubbleToCard(bubble, activity, end.x, end.y); bubble.removeEventListener('transitionend', onFinish); };
            bubble.addEventListener('transitionend', onFinish, { once: true });
            setTimeout(() => { if(bubble && bubble.isConnected) evolveBubbleToCard(bubble, activity, end.x, end.y); }, 1400);
        }
        
        async function startBubbleSequence() {
            for (let i = 0; i < totalBubbles; i++) {
                if (isAnimationFinished) break;
                await createBubbleAsync(i, targetPositions[i]);
                if (i < totalBubbles - 1) await new Promise(r => setTimeout(r, 750));
            }
            // 10秒后强制完成（保险）
            setTimeout(() => {
                if(animationCompletedCount < totalBubbles && !isAnimationFinished) {
                    for(let i=0; i<activities.length; i++) if(!addedToGrid.has(activities[i].id)) { addCardToGrid(activities[i]); addedToGrid.add(activities[i].id); animationCompletedCount++; }
                    cardsGrid.classList.add('visible');
                    lineArea.style.display = 'block';
                    isAnimationFinished = true;
                }
            }, 10000);
        }
        
        // 初始化，隐藏卡片网格，开始动画
        cardsGrid.classList.remove('visible');
        startBubbleSequence();
        
        // 调试模式：Ctrl+Shift+D 显示/隐藏红点标记，并刷新起点预览（不重新开始动画）
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyD') {
                e.preventDefault();
                debugMode = !debugMode;
                if (debugMode) {
                    // 获取当前起点并显示红点
                    getStartPointAsync().then(pos => {
                        toggleDebugMarker(true, pos.x, pos.y);
                        console.log('Debug mode ON, mouth position:', pos);
                    });
                } else {
                    toggleDebugMarker(false);
                }
            }
        });
        
        // 窗口大小改变时，如果调试模式开启，刷新红点位置
        let resizeTimer;
        window.addEventListener('resize', () => {
            if (debugMode) {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    getStartPointAsync().then(pos => {
                        toggleDebugMarker(true, pos.x, pos.y);
                    });
                }, 200);
            }
        });
        
        // LINE URL 确认
        const lineLink = document.getElementById('lineLink');
        if(lineLink && lineLink.getAttribute('href') !== 'https://lin.ee/1n4YOHY') {
            lineLink.href = "https://lin.ee/1n4YOHY";
        }
    })();
</script>
</body>
</html>
